<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Caronas Aqui - O app de caronas exclusivo para universitários. Combine ida e volta com estudantes perto de você com segurança.">
<!-- Google AdSense - Carregado apenas uma vez no head -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4628393920859887" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caronas Aqui</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="login-page">
  <div class="login-left">
    <div class="login-left-content">

      <div class="login-brand">
        <div class="login-brand-icon">
          <img src="assets/brand-carona-aqui.svg" alt="Caronas Aqui">
        </div>
        <span class="login-brand-name">Caronas Aqui</span>
      </div>

      <div class="login-hero">
        <h1 class="login-headline">Vá de carona para a faculdade.</h1>
        <p class="login-sub">Combine ida e volta com estudantes perto de voce.</p>
      </div>

      <div class="login-route-preview">
        <img src="assets/route-preview.svg" alt="Mapa de uma rota de carona ate a faculdade">
      </div>

      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span>Estudantes verificados</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <span>Ida e volta combinadas</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <span>Status da rota em tempo real</span>
        </div>
      </div>

      <!-- Google AdSense - Slot de Anúncio -->
      <div style="margin-top: 30px; width: 100%; text-align: center;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4628393920859887"
             data-ad-slot="SUBSTITUIR_PELO_SEU_SLOT_ID"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>

    </div>
  </div>

  <div class="login-right">
    <div class="auth-card">

      <div class="tabs">
        <button id="tabLogin" class="active">Entrar</button>
        <button id="tabRegister">Registrar</button>
      </div>

      <h2 id="titulo">Entrar</h2>

      <form id="authForm" class="contents-form" onsubmit="acaoAuth();return false;">
      <div class="auth-fields" id="authFields">
        <label class="form-label" for="nomeUsuario" id="labelIdentificador">Matricula ou usuario</label>
        <input id="nomeUsuario" placeholder="Ex: 2024123456" autocapitalize="none" spellcheck="false" autocomplete="username" required>
        <p id="erroNomeUsuario" class="field-error" aria-live="polite"></p>

        <div class="campos-extras" id="camposExtras">
          <div class="campos-extras-inner">
            <label class="form-label" for="matriculaUsuario">Matricula institucional</label>
            <input id="matriculaUsuario" placeholder="Somente numeros, 8 a 12 digitos" inputmode="numeric" autocomplete="off">
            <p id="erroMatriculaUsuario" class="field-error" aria-live="polite"></p>

            <label class="form-label" for="faculdadeUsuario">Faculdade</label>
            <select id="faculdadeUsuario" class="input-select"></select>
            <p id="faculdadeInfo" class="field-hint"></p>
            <p id="erroFaculdadeUsuario" class="field-error" aria-live="polite"></p>

          </div>
        </div>

        <label class="form-label" for="senha">Senha</label>
        <div class="senha-wrapper">
          <input id="senha" type="password" placeholder="Senha" autocomplete="current-password" required>
          <button type="button" class="btn-olho" id="btnOlho" aria-label="Mostrar senha">
            <svg id="iconeOlho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p id="erroSenha" class="field-error" aria-live="polite"></p>

        <div class="campos-extras" id="campoConfirmarSenha">
          <div class="campos-extras-inner">
            <label class="form-label" for="confirmarSenha">Confirmar senha</label>
            <div class="senha-wrapper">
              <input id="confirmarSenha" type="password" placeholder="Confirmar senha" autocomplete="new-password">
              <button type="button" class="btn-olho" id="btnOlhoConfirmar" aria-label="Mostrar confirmacao de senha">
                <svg id="iconeOlhoConfirmar" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      </form>
      <p id="authFeedback" class="form-status auth-feedback" aria-live="polite"></p>

      <div class="auth-actions">
        <button class="btn-primary" type="submit" form="authForm" id="btnAcao">Entrar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
<script src="js/config/faculdades.js"></script>
<script src="js/config/firebase-config.js"></script>
<script src="js/services/firebase.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/core/login-page.js"></script>

</body>
</html>
