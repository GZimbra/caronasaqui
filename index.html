<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caronas Aqui</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-left">
    <div class="login-left-content">

      <div class="login-brand">
        <div class="login-brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><rect x="9" y="11" width="14" height="10" rx="1"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        </div>
        <span class="login-brand-name">Caronas Aqui</span>
      </div>

      <div class="login-hero">
        <h1 class="login-headline">Chegue junto.<br>Gaste menos.</h1>
        <p class="login-sub">A plataforma de caronas para estudantes da Dom Bosco. Compartilhe rotas, economize na gasolina e faça amigos no caminho.</p>
      </div>
      <!-- Features -->
      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span>Só estudantes verificados</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <span>Divida o custo da viagem</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <span>Rotas em tempo real</span>
        </div>
      </div>

    </div>
  </div>

  <div class="login-right">
    <div class="auth-card">

      <div class="tabs">
        <button onclick="mostrarLogin(true)"    id="tabLogin"    class="active">Entrar</button>
        <button onclick="mostrarRegistro()" id="tabRegister">Registrar</button>
      </div>

      <h2 id="titulo">Entrar</h2>

      <div class="auth-fields" id="authFields">
        <!-- Campo nome: aparece sempre (login usa como identificador, registro cadastra) -->
        <input id="nomeUsuario" placeholder="Nome de usuário" autocapitalize="none" spellcheck="false">

        <!-- Campo extra só no registro -->
        <div class="campos-extras" id="camposExtras">
          <div class="campos-extras-inner">
            <input id="confirmarSenha" type="password" placeholder="Confirmar senha">
          </div>
        </div>

        <div class="senha-wrapper">
          <input id="senha" type="password" placeholder="Senha">
          <button type="button" class="btn-olho" onclick="toggleSenha()" id="btnOlho" aria-label="Mostrar senha">
            <svg id="iconeOlho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <button class="btn-primary" onclick="acaoAuth()" id="btnAcao">Entrar</button>

      </div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="js/services/firebase.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/core/auth.js"></script>

<script>
if (localStorage.getItem("user")) {
  window.location.replace("app.html");

  input.value = v;
}

function toggleSenha() {
  const input = document.getElementById("senha");
  const icone = document.getElementById("iconeOlho");
  const mostrar = input.type === "password";
  input.type = mostrar ? "text" : "password";
  icone.innerHTML = mostrar
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}
</script>

</body>
</html>
