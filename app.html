<!-- 🔐 VALIDA USUÁRIO ANTES DE TUDO -->
<script>
(function(){

  const user = localStorage.getItem("user");

  if(!user){
    window.location.replace("index.html");
    return;
  }

  // 🔥 DEFINE GLOBAL ANTES DOS SCRIPTS
  window.usuarioLogado = JSON.parse(user);

})();
</script>
